name: Deploy Staging Website

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/bhuvi-staging

            echo "Pulling latest code..."
            git pull origin staging

            echo "Installing dependencies..."
            /root/.local/share/pnpm/pnpm install

            echo "Building Next.js app..."
            /root/.local/share/pnpm/pnpm build

            echo "Restarting PM2..."
            /root/.local/share/pnpm/pm2 reload bhuvi-staging || /root/.local/share/pnpm/pm2 start "/root/.local/share/pnpm/pnpm start --port 3001" --name bhuvi-staging

            echo "Deployment complete"